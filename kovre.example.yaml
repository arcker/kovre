# kovre — exemple de configuration
# Voir README.md pour les détails et limitations.

agent:
  data_dir: C:\ProgramData\Kovre
  log_level: info

repositories:
  # Backend recommandé pour photos / documents / mails / jeux :
  # fichiers natifs sur le NAS, browsables depuis Explorer.
  nas:
    path: \\nas.local\backup\kovre
    backend: mirror

  # Backend rustic : encrypted + dedup. Pour dev trees, logs, dumps.
  dev-archive:
    path: \\nas.local\backup\kovre-rustic
    backend: rustic
    password_file: C:\ProgramData\Kovre\dev.key

jobs:
  # Documents, Desktop, Pictures, Music, Videos, Downloads, Saved Games.
  user-files:
    template: user-files
    repository: nas
    retention:
      keep_versions: 5

  # Tous les profils Thunderbird sous %APPDATA%\Thunderbird\Profiles.
  mail:
    template: thunderbird-mail
    repository: nas
    retention:
      keep_versions: 3

  # Bookmarks / History / Logins / Extensions des navigateurs installés.
  browsers:
    template: browser-profiles
    repository: nas
    retention:
      keep_versions: 3

  # Saves de jeux Steam, détectées via le manifest Ludusavi.
  steam:
    template: steam-saves
    repository: nas
    retention:
      keep_versions: 5

  # Dev repositories — typiquement vers le repo rustic (dedup paie).
  code:
    template: dev-repos
    repository: dev-archive
    template_options:
      scan_root: D:\dev
    retention:
      keep_last: 30

  # Job sans template — paths/excludes explicites.
  custom-photos:
    repository: nas
    paths:
      - D:\Photos
    excludes:
      - "**/*.tmp"
    retention:
      keep_versions: 10
